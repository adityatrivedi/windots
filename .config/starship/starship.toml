# taplo: schema=https://starship.rs/config-schema.json

palette = "catppuccin_macchiato"
add_newline = false
command_timeout = 1000
format = "$env_var$all"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold yellow)"

[directory]
style = "bold lavender"
truncation_length = 3
truncate_to_repo = false

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind]($style) "

[git_branch]
style = "bold mauve"

[package]
disabled = true

[cmd_duration]
min_time = 2000
format = "took [$duration](bold peach) "

[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M"
style = "subtext0"

[username]
disabled = false
show_always = true
style_user = "bold teal"
format = "[$user]($style) in "

[hostname]
disabled = true

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo  = "#f0c6c6"
pink      = "#f5bde6"
mauve     = "#c6a0f6"
red       = "#ed8796"
maroon    = "#ee99a0"
peach     = "#f5a97f"
yellow    = "#eed49f"
green     = "#a6da95"
teal      = "#8bd5ca"
sky       = "#91d7e3"
sapphire  = "#7dc4e4"
blue      = "#8aadf4"
lavender  = "#b7bdf8"
text      = "#cad3f5"
subtext1  = "#b8c0e0"
subtext0  = "#a5adcb"
overlay2  = "#939ab7"
overlay1  = "#8087a2"
overlay0  = "#6e738d"
surface2  = "#5b6078"
surface1  = "#494d64"
surface0  = "#363a4f"
base      = "#24273a"
mantle    = "#1e2030"
crust     = "#181926"
